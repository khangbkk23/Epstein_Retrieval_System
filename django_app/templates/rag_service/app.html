{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-5xl mx-auto mt-8 h-[75vh] flex flex-col bg-white shadow-2xl rounded-xl overflow-hidden border border-gray-200 relative">
    
    <div id="auth-overlay" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">System Authentication</h2>
            <p class="text-gray-500 mb-6 text-sm">Please enter your passcode to generate a JWT and access the database.</p>
            
            <form id="login-form" class="space-y-4">
                <input type="password" id="auth-passcode" required autocomplete="off"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500" 
                    placeholder="Enter passcode...">
                <button type="submit" id="login-btn"
                    class="w-full bg-blue-600 text-white font-bold rounded-lg px-4 py-3 hover:bg-blue-700 transition">
                    Authenticate & Generate JWT
                </button>
                <p id="login-error" class="text-red-500 text-sm hidden"></p>
            </form>
        </div>
    </div>

    <div id="chat-box" class="flex-grow p-6 overflow-y-auto bg-slate-50 space-y-5">
        <div class="flex items-start">
            <div class="bg-blue-100 text-blue-900 p-4 rounded-lg rounded-tl-none max-w-[80%] shadow-sm border border-blue-200">
                <p class="font-bold mb-1 text-xs uppercase tracking-widest text-blue-800">System Ready (Secured via JWT)</p>
                <p class="text-[15px]">Authentication complete. The Agentic RAG engine is now ready for your queries.</p>
            </div>
        </div>
    </div>

    <div class="p-5 bg-white border-t border-gray-200">
        <form id="chat-form" class="flex space-x-4">
            <input type="text" id="user-input" required autocomplete="off"
                class="flex-grow border border-gray-300 rounded-lg px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                placeholder="Search the archives...">
            <button type="submit" id="send-btn"
                class="bg-slate-900 text-white px-8 py-3 rounded-lg hover:bg-slate-800 transition shadow-md font-semibold flex items-center justify-center min-w-[140px]">
                <span id="btn-text">Search</span>
                <svg id="loading-spinner" class="animate-spin ml-2 h-5 w-5 hidden text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
    </div>
</div>

<script src="{% static 'js/chat_logic.js' %}"></script>
{% endblock %}
