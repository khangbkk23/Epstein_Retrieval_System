dataset:
  name: "teyler/epstein-files-20k"
  split: "train"
  streaming: true

storage:
  index_dir: "./data/faiss_index"
  metadata_path: "./data/faiss_index/metadata.pkl"

processing:
  chunk_size: 1000
  chunk_overlap: 150
  min_length: 50
  batch_size: 512

embedding:
  model_name: "BAAI/bge-large-en-v1.5"
  dimension: 1024
  # device: "cuda"
  device: "cpu"
  normalize: true

retrieval:
  top_k: 5
  score_threshold: 0.75